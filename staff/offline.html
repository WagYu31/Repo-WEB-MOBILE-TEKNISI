<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loewix - Offline</title>
  <link rel="icon" type="image/png" href="assets/img/logo/lwx.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 420px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    .icon svg {
      width: 40px;
      height: 40px;
      fill: none;
      stroke: #60a5fa;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-retry {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37,99,235,0.3);
    }
    .logo { width: 60px; margin-bottom: 20px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/img/logo/lwx.png" alt="Loewix" class="logo">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>Anda Sedang Offline</h1>
    <p>Tidak ada koneksi internet. Pastikan perangkat Anda terhubung ke jaringan, lalu coba lagi.</p>
    <button class="btn-retry" onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
